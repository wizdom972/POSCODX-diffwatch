<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diffwatch</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">👁</span>
      <span class="logo-text">diffwatch</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span> 대시보드
      </a>
      <a class="nav-item" data-page="commits" onclick="navigate('commits')">
        <span class="nav-icon">🔀</span> 커밋 분석
      </a>
      <a class="nav-item" data-page="notifications" onclick="navigate('notifications')">
        <span class="nav-icon">🔔</span> 알림 이력
      </a>
    </nav>
  </aside>

  <!-- 메인 -->
  <main class="main">

    <!-- 대시보드 -->
    <section id="page-dashboard" class="page active">
      <div class="page-header">
        <h1>대시보드</h1>
        <button class="btn-refresh" onclick="loadAll()">↻ 새로고침</button>
      </div>
      <div class="stat-cards" id="stat-cards">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">총 분석 커밋</div>
        </div>
        <div class="stat-card high">
          <div class="stat-value" id="stat-high">—</div>
          <div class="stat-label">높은 영향도</div>
        </div>
        <div class="stat-card mid">
          <div class="stat-value" id="stat-mid">—</div>
          <div class="stat-label">중간 영향도</div>
        </div>
        <div class="stat-card low">
          <div class="stat-value" id="stat-low">—</div>
          <div class="stat-label">낮은 영향도</div>
        </div>
        <div class="stat-card notif">
          <div class="stat-value" id="stat-notif">—</div>
          <div class="stat-label">발송 알림</div>
        </div>
      </div>
      <h2 class="section-title">최근 커밋 분석</h2>
      <div class="table-wrap" id="recent-commits"></div>
    </section>

    <!-- 커밋 분석 -->
    <section id="page-commits" class="page">
      <div class="page-header">
        <h1>커밋 분석</h1>
        <button class="btn-refresh" onclick="loadChanges()">↻ 새로고침</button>
      </div>
      <div class="table-wrap" id="all-commits"></div>
    </section>

    <!-- 알림 이력 -->
    <section id="page-notifications" class="page">
      <div class="page-header">
        <h1>알림 이력</h1>
        <button class="btn-refresh" onclick="loadNotifications()">↻ 새로고침</button>
      </div>
      <div id="notif-list"></div>
    </section>

  </main>

  <!-- 커밋 상세 모달 (전역) -->
  <div id="commit-modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- FAB 챗봇 버튼 -->
  <button class="fab" onclick="toggleChat()" title="AI 에이전트와 대화">
    <span id="fab-icon">💬</span>
  </button>

  <!-- 챗봇 패널 -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <span>🤖 AI 에이전트</span>
      <button onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg assistant">
        안녕하세요! 코드 변경 이력이나 영향도에 대해 무엇이든 물어보세요.
      </div>
    </div>
    <div class="chat-input-row">
      <input
        id="chat-input"
        type="text"
        placeholder="메시지를 입력하세요..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button onclick="sendMessage()">전송</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
